# Stage 3 — Lift to 3D Bounding Boxes Configuration
# Lifts 2D detections + disparity map → 3D bounding boxes
# Method can be extended in future iterations via method field

method: lift_v1
output_dir: ./outputs/boxes3d

# Disparity source — switch between sgbm and waft without touching stage3_lift.py
disp_dir: ./outputs/depth/sgbm

min_valid_pixels: 10          # Skip box if fewer valid depth pixels than this
                              # Prevents garbage boxes from empty frustums

# Depth sampling strategy.
# validate_stage3_lift.py overrides this per method (percentile_20 for sgbm,
# percentile_35 for waft — tuned in experiments/percentile_choice.md). This
# default applies when running stage3_lift.py standalone with sgbm output.
depth_sampling: percentile_20

# ROI refinement — removes ground/road contamination from dense depth maps.
# validate_stage3_lift.py overrides these per method (1.0/null for sgbm,
# 0.40/6.0 for waft). Defaults here are safe for standalone sgbm use.
# crop_top_frac: keep only the top fraction of the box height.
# min_depth_m: gate out disparity values closer than this distance.
crop_top_frac: 1.0
min_depth_m: null

# --- Matching (validation) ---
# Predictions and GT are matched by 3D center distance, per class — Stage 3
# emits position + 2D box only (no size/heading), so IoU-based matching no
# longer applies. A prediction matches the nearest unmatched same-class GT
# within max_dist metres. Same convention as config/stage4.yaml.
matching:
  max_dist:
    Car: 2.0
    Pedestrian: 1.0






