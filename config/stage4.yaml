# Stage 4 — V2V Cooperative Fusion Configuration
# Fuses two CARLA agents' 3D boxes into Vehicle A's coordinate frame. The
# fusion core (utils/fusion.py) is source-agnostic; only the data loading
# (utils/carla_loader.py) is CARLA-specific.

method: fuse_v1
output_dir: ./outputs/fusion

# --- CARLA backend ---
# Real simultaneous V2V: the two agents are genuine different viewpoints at one
# timestamp, so dynamic objects fuse correctly too (no temporal caveat).
carla:
  root: ./data/carla           # dataset root (scenario folders live under here)
  split: test                  # which split's scenarios to read
  agent_a: null                # Vehicle A agent ID; null = first agent in scene
  agent_b: null                # Vehicle B agent ID; null = second agent in scene
  use_gt_boxes: true           # true = fuse GT boxes (baseline / smoke test);
                               # false = per-agent detector (run Stages 1-3)
  min_visible_pixels: 10       # a GT car counts toward an agent's truth only if
                               # >= this many of its pixels are actually visible
                               # to that agent (gt_boxes metrics_metadata
                               # visible_pixels_vA/vB) — drops occluded / out-of-
                               # frame cars that geometry alone would keep.

matching:
  # Greedy match across A and registered-B by BEV (x-z) centre distance,
  # same class. A pair matches if distance <= the per-class threshold.
  metric: center_dist
  max_dist:
    Car: 2.0   # Car-only pipeline (Pedestrian dropped 2026-06-10)

static_filter:
  # A matched pair is fused if its BEV centre displacement AFTER registration
  # is below this. For simultaneous V2V a larger displacement signals a bad
  # match or pose error (not a moving object), so the pair is flagged
  # is_dynamic and kept unmerged rather than fused.
  max_displacement_m: 1.0

fusion:
  # Matched pair confidence: noisy-OR = 1 - (1-conf_a)(1-conf_b).
  # Pose/dimensions = confidence-weighted average; heading = circular mean.
  # Unmatched boxes keep their original confidence, tagged by source vehicle.
  confidence: noisy_or
