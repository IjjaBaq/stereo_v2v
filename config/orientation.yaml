# Orientation head — learned allocentric angle (alpha) estimation
# Predicts alpha from vehicle crops; global heading recovered geometrically
# via utils.geometry.recover_rotation_y (rotation_y = alpha + ray_angle).
#
# EXPERIMENTAL — not validated end-to-end. Decoupled behind
# heading_method: learned in stage3.yaml (Stage 3 defaults to ray_angle).
# Safe to ignore for now.

method: orientation_v1

# --- Model ---
model:
  backbone: convnext_tiny      # timm name. CNN over ViT: small crops + limited data
  crop_size: 224               # square resize fed to the backbone
  freeze_backbone: true        # train heads only first; unfreeze for a 2nd run
  pretrained: true             # ImageNet weights at train time

# Inference checkpoint — downloaded from Colab after training
checkpoint_path: ./models/orientation/convnext_tiny_alpha.pth

# --- Data preparation (scripts/prepare_orientation_data.py) ---
data:
  # Source is the KITTI OBJECT detection split (has per-object alpha in label_2)
  classes: [Car, Van, Truck]   # vehicles only — ped/cyclist orientation ill-defined
  max_truncated: 0.5           # drop heavily truncated objects (unreliable alpha)
  max_occluded: 1              # 0=visible, 1=partly occluded; drop 2,3
  min_box_px: 20               # drop tiny crops (too few pixels to read pose)
  val_fraction: 0.2            # split BY IMAGE (seed 42) to avoid leakage
  output_dir: ./outputs/orientation

# --- Training (scripts/train_orientation.py — Colab GPU) ---
train:
  epochs: 30
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.0001
  bin_loss_weight: 0.5         # weight on front/back cross-entropy vs angular loss
  # Augmentation. NOTE: horizontal flip negates alpha (alpha -> -alpha) and
  # swaps the front/back bin — handled in the dataset, never flip pixels alone.
  augment:
    hflip: true
    color_jitter: true
  num_workers: 4
  checkpoint_dir: ./models/orientation
